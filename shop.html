        <script>
            (function () {
                var STORES = {
                    CO: 'https://www.encountercolombiancoffee.com/tienda/',
                    CA: 'https://www.encountercolombiancoffee.ca/store/'
                };
                var LABELS = {
                    CO: { flag: '🇨🇴', label: '.com', next: 'CA' },
                    CA: { flag: '🇨🇦', label: '.ca',  next: 'CO' }
                };

                function getRegion() {
                    return localStorage.getItem('encounter_country') || 'CA';
                }

                function applyRegion(region) {
                    var frame  = document.getElementById('storeFrame');
                    var flag   = document.getElementById('domainFlag');
                    var lbl    = document.getElementById('domainLabel');
                    var info   = LABELS[region] || LABELS.CA;

                    if (frame)  frame.src  = STORES[region] || STORES.CA;
                    if (flag)   flag.textContent  = info.flag;
                    if (lbl)    lbl.textContent   = info.label;
                }

                document.getElementById('domainSwitcher').addEventListener('click', function () {
                    var current = getRegion();
                    var next    = LABELS[current].next;
                    localStorage.setItem('encounter_country', next);
                    applyRegion(next);
                });

                applyRegion(getRegion());
            })();
        </script>
